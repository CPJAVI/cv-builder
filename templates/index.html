<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Builder</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div class="modal" id="languageModal">
        <div class="modal-content">
            <h2>🌍 Select Language</h2>
            <button id="selectSpanish" class="lang-btn">🇪🇸 Español</button>
            <button id="selectEnglish" class="lang-btn">🇬🇧 English</button>
        </div>
    </div>

    <div class="chat-container" id="chatContainer" style="display: none;">
        <div class="chat-header">
            <h2 id="headerTitle">📄 CV Builder</h2>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="input-area" id="inputArea">
            <button id="backBtn" class="back-btn" style="display: none;">◀ Back</button>
            <input type="text" id="chatInput" placeholder="Type here...">
            <button id="sendBtn">Send</button>
        </div>
        <div class="download-container" id="downloadContainer">
            <button id="downloadBtn" class="download-btn">📄 DOWNLOAD CV PDF</button>
            <button id="reiniciarBtn" class="reiniciar-btn">🔄 START OVER</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
