<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Builder</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            max-width: 700px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .chat-messages {
            height: 450px;
            overflow-y: auto;
            padding: 20px;
            background: #f7f7f7;
        }

        .message {
            margin-bottom: 15px;
            padding: 12px 18px;
            border-radius: 20px;
            max-width: 80%;
            word-wrap: break-word;
        }

        .message.bot {
            background: #667eea;
            color: white;
            margin-right: auto;
        }

        .message.user {
            background: #4CAF50;
            color: white;
            margin-left: auto;
        }

        .input-area {
            display: flex;
            padding: 20px;
            background: white;
            border-top: 1px solid #ddd;
        }

        #chatInput {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
        }

        #chatInput:focus {
            border-color: #667eea;
        }

        button {
            margin-left: 10px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }

        button:hover {
            transform: scale(1.02);
        }

        .form-campo {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-top: 10px;
            border: 1px solid #ddd;
        }

        .form-campo input, .form-campo textarea, .form-campo select {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .form-campo button {
            margin-top: 10px;
            width: 100%;
        }

        .btn-saltar {
            background: #ff9800;
            margin-top: 10px;
        }

        .download-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #ddd;
            display: none;
        }

        .download-btn {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            background: #e94560;
            margin-bottom: 10px;
        }

        .download-btn:hover {
            background: #c73a54;
        }

        .reiniciar-btn {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            background: #2196F3;
        }

        .reiniciar-btn:hover {
            background: #0b7dda;
        }

        /* Modal de idioma */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .modal-content h2 {
            margin-bottom: 30px;
            color: #667eea;
        }

        .lang-btn {
            margin: 10px;
            padding: 15px 30px;
            font-size: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body>
    <div id="languageModal" class="modal">
        <div class="modal-content">
            <h2>🌍 Select Language / Selecciona Idioma</h2>
            <button id="selectSpanish" class="lang-btn">🇪🇸 Español</button>
            <button id="selectEnglish" class="lang-btn">🇬🇧 English</button>
        </div>
    </div>

    <div class="chat-container" id="chatContainer" style="display: none;">
        <div class="chat-header">
            <h2 id="headerTitle">📄 Constructor de CV</h2>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="message bot" id="welcomeMessage">¡Hola! Vamos a crear tu CV. ¿Cuál es tu nombre y apellidos?</div>
        </div>
        <div class="input-area" id="inputArea">
            <input type="text" id="chatInput" placeholder="Escribe aquí...">
            <button id="sendBtn">Enviar</button>
        </div>
        <div class="download-container" id="downloadContainer">
            <button id="downloadBtn" class="download-btn" id="downloadBtnText">📄 DESCARGAR CV EN PDF</button>
            <button id="reiniciarBtn" class="reiniciar-btn" id="restartBtnText">🔄 EMPEZAR DE NUEVO</button>
        </div>
    </div>

    <script>
        let step = 0;
        let currentLang = 'es';
        let cvData = {
            nombre: '',
            fecha: '',
            enlaces: [],
            descripcion: '',
            educacion: [],
            experiencia: [],
            idiomas: [],
            carnet: ''
        };
        
        let enlacesTemp = [];
        let esperandoRespuesta = false;

        // Traducciones
        const text = {
            es: {
                header: "📄 Constructor de CV",
                welcome: "¡Hola! Vamos a crear tu CV. ¿Cuál es tu nombre y apellidos?",
                askFecha: "¿Cuál es tu fecha de nacimiento? (DD/MM/AAAA)",
                askEnlaces: "📎 Ahora tus ENLACES PERSONALES:",
                formEnlaceNombre: "Nombre (Ej: LinkedIn, GitHub, Twitter)",
                formEnlaceUrl: "URL del enlace",
                btnGuardar: "Guardar Enlace",
                btnSaltar: "⏭️ No tengo enlaces",
                enlaceGuardado: "✅ Enlace añadido: ",
                preguntarOtro: "¿Quieres añadir otro enlace? (responde si/no)",
                saltarEnlaces: "⏭️ Saltaste enlaces",
                askDescripcion: "Escribe una breve descripción profesional:",
                askEducacion: "📚 Ahora tu EDUCACIÓN:",
                institucion: "Institución",
                fechaInicio: "Fecha inicio (Mes Año)",
                fechaFin: "Fecha fin (Mes Año) o Actualidad",
                descripcion: "Descripción",
                guardarEducacion: "Guardar Educación",
                noEducacion: "⏭️ No tengo educación",
                educacionGuardada: "✅ Educación añadida: ",
                saltarEducacion: "⏭️ Saltaste educación",
                askExperiencia: "💼 Ahora tu EXPERIENCIA LABORAL:",
                puesto: "Puesto",
                empresa: "Empresa",
                guardarExperiencia: "Guardar Experiencia",
                noExperiencia: "⏭️ No tengo experiencia",
                experienciaGuardada: "✅ Experiencia añadida: ",
                saltarExperiencia: "⏭️ Saltaste experiencia",
                askIdiomas: "🌍 Ahora tus IDIOMAS:",
                idioma: "Idioma",
                nivel: "Nivel",
                guardarIdioma: "Guardar Idioma",
                noIdiomas: "⏭️ No tengo idiomas",
                idiomaGuardado: "✅ Idioma añadido: ",
                saltarIdiomas: "⏭️ Saltaste idiomas",
                askCarnet: "🚗 ¿Tienes carnet de conducir? (responde si/no)",
                carnetSi: "si",
                carnetNo: "no",
                cvCompletado: "✅ ¡CV completado! Puedes descargar tu CV.",
                downloadBtn: "📄 DESCARGAR CV EN PDF",
                restartBtn: "🔄 EMPEZAR DE NUEVO",
                campoObligatorio: "❌ Completa todos los campos",
                noEnlaces: "No se añadieron enlaces",
                noEspecificada: "No especificada",
                noEspecificados: "No especificados",
                enlacesTitulo: "🔗 Enlaces:",
                perfil: "Perfil:",
                educacionTitulo: "🎓 Educación",
                experienciaTitulo: "💼 Experiencia",
                idiomasTitulo: "🌍 Idiomas",
                carnetTitulo: "🚗 Carnet",
                si: "Sí",
                no: "No",
                fechaNacimiento: "Fecha nacimiento:"
            },
            en: {
                header: "📄 CV Builder",
                welcome: "Hello! Let's create your CV. What is your full name?",
                askFecha: "What is your date of birth? (DD/MM/YYYY)",
                askEnlaces: "📎 Now your PERSONAL LINKS:",
                formEnlaceNombre: "Name (Eg: LinkedIn, GitHub, Twitter)",
                formEnlaceUrl: "URL link",
                btnGuardar: "Save Link",
                btnSaltar: "⏭️ I have no links",
                enlaceGuardado: "✅ Link added: ",
                preguntarOtro: "Do you want to add another link? (answer yes/no)",
                saltarEnlaces: "⏭️ You skipped links",
                askDescripcion: "Write a brief professional description:",
                askEducacion: "📚 Now your EDUCATION:",
                institucion: "Institution",
                fechaInicio: "Start date (Month Year)",
                fechaFin: "End date (Month Year) or Present",
                descripcion: "Description",
                guardarEducacion: "Save Education",
                noEducacion: "⏭️ I have no education",
                educacionGuardada: "✅ Education added: ",
                saltarEducacion: "⏭️ You skipped education",
                askExperiencia: "💼 Now your WORK EXPERIENCE:",
                puesto: "Position",
                empresa: "Company",
                guardarExperiencia: "Save Experience",
                noExperiencia: "⏭️ I have no experience",
                experienciaGuardada: "✅ Experience added: ",
                saltarExperiencia: "⏭️ You skipped experience",
                askIdiomas: "🌍 Now your LANGUAGES:",
                idioma: "Language",
                nivel: "Level",
                guardarIdioma: "Save Language",
                noIdiomas: "⏭️ I have no languages",
                idiomaGuardado: "✅ Language added: ",
                saltarIdiomas: "⏭️ You skipped languages",
                askCarnet: "🚗 Do you have a driver's license? (answer yes/no)",
                carnetSi: "yes",
                carnetNo: "no",
                cvCompletado: "✅ CV completed! You can download your CV.",
                downloadBtn: "📄 DOWNLOAD CV AS PDF",
                restartBtn: "🔄 START OVER",
                campoObligatorio: "❌ Complete all fields",
                noEnlaces: "No links added",
                noEspecificada: "Not specified",
                noEspecificados: "Not specified",
                enlacesTitulo: "🔗 Links:",
                perfil: "Profile:",
                educacionTitulo: "🎓 Education",
                experienciaTitulo: "💼 Work Experience",
                idiomasTitulo: "🌍 Languages",
                carnetTitulo: "🚗 Driver's License",
                si: "Yes",
                no: "No",
                fechaNacimiento: "Date of birth:"
            }
        };

        function reiniciarTodo() {
            step = 0;
            cvData = {
                nombre: '',
                fecha: '',
                enlaces: [],
                descripcion: '',
                educacion: [],
                experiencia: [],
                idiomas: [],
                carnet: ''
            };
            enlacesTemp = [];
            esperandoRespuesta = false;
            
            document.getElementById('chatMessages').innerHTML = '';
            document.getElementById('inputArea').style.display = 'flex';
            document.getElementById('downloadContainer').style.display = 'none';
            
            addMessage(text[currentLang].welcome, 'bot');
        }

        function addMessage(text, type) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = text;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addFormMessage(formElement) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message bot';
            messageDiv.appendChild(formElement);
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function mostrarFormularioEnlaces() {
            const formDiv = document.createElement('div');
            formDiv.className = 'form-campo';
            formDiv.innerHTML = `
                <input type="text" class="enlaceNombre" placeholder="${text[currentLang].formEnlaceNombre}">
                <input type="text" class="enlaceUrl" placeholder="${text[currentLang].formEnlaceUrl}">
                <button class="guardarEnlaceBtn">${text[currentLang].btnGuardar}</button>
                <button class="saltarEnlaceBtn btn-saltar">${text[currentLang].btnSaltar}</button>
            `;
            
            addFormMessage(formDiv);
            
            const btnGuardar = formDiv.querySelector('.guardarEnlaceBtn');
            btnGuardar.addEventListener('click', () => {
                const nombre = formDiv.querySelector('.enlaceNombre').value;
                const url = formDiv.querySelector('.enlaceUrl').value;
                
                if (nombre && url) {
                    enlacesTemp.push({ nombre, url });
                    addMessage(`${text[currentLang].enlaceGuardado}${nombre} - ${url}`, 'bot');
                    addMessage(text[currentLang].preguntarOtro, 'bot');
                    step = 2.5;
                    esperandoRespuesta = true;
                } else {
                    addMessage(text[currentLang].campoObligatorio, 'bot');
                }
            });
            
            const btnSaltar = formDiv.querySelector('.saltarEnlaceBtn');
            btnSaltar.addEventListener('click', () => {
                addMessage(text[currentLang].saltarEnlaces, 'bot');
                addMessage(text[currentLang].askDescripcion, 'bot');
                step = 3;
                esperandoRespuesta = false;
            });
        }

        function mostrarFormularioEducacion() {
            const formDiv = document.createElement('div');
            formDiv.className = 'form-campo';
            formDiv.innerHTML = `
                <input type="text" class="eduInstitucion" placeholder="${text[currentLang].institucion}">
                <input type="text" class="eduInicio" placeholder="${text[currentLang].fechaInicio}">
                <input type="text" class="eduFin" placeholder="${text[currentLang].fechaFin}">
                <textarea class="eduDescripcion" placeholder="${text[currentLang].descripcion}" rows="3"></textarea>
                <button class="guardarEduBtn">${text[currentLang].guardarEducacion}</button>
                <button class="saltarEduBtn btn-saltar">${text[currentLang].noEducacion}</button>
            `;
            
            addFormMessage(formDiv);
            
            const btnGuardar = formDiv.querySelector('.guardarEduBtn');
            btnGuardar.addEventListener('click', () => {
                const institucion = formDiv.querySelector('.eduInstitucion').value;
                const inicio = formDiv.querySelector('.eduInicio').value;
                const fin = formDiv.querySelector('.eduFin').value;
                const descripcion = formDiv.querySelector('.eduDescripcion').value;
                
                if (institucion && inicio && fin && descripcion) {
                    cvData.educacion.push({ institucion, inicio, fin, descripcion });
                    addMessage(`${text[currentLang].educacionGuardada}${institucion}`, 'bot');
                    addMessage(text[currentLang].preguntarOtro, 'bot');
                    step = 4.5;
                    esperandoRespuesta = true;
                } else {
                    addMessage(text[currentLang].campoObligatorio, 'bot');
                }
            });
            
            const btnSaltar = formDiv.querySelector('.saltarEduBtn');
            btnSaltar.addEventListener('click', () => {
                addMessage(text[currentLang].saltarEducacion, 'bot');
                addMessage(text[currentLang].askExperiencia, 'bot');
                mostrarFormularioExperiencia();
                step = 5;
                esperandoRespuesta = false;
            });
        }

        function mostrarFormularioExperiencia() {
            const formDiv = document.createElement('div');
            formDiv.className = 'form-campo';
            formDiv.innerHTML = `
                <input type="text" class="expPuesto" placeholder="${text[currentLang].puesto}">
                <input type="text" class="expEmpresa" placeholder="${text[currentLang].empresa}">
                <input type="text" class="expInicio" placeholder="${text[currentLang].fechaInicio}">
                <input type="text" class="expFin" placeholder="${text[currentLang].fechaFin}">
                <textarea class="expDescripcion" placeholder="${text[currentLang].descripcion}" rows="3"></textarea>
                <button class="guardarExpBtn">${text[currentLang].guardarExperiencia}</button>
                <button class="saltarExpBtn btn-saltar">${text[currentLang].noExperiencia}</button>
            `;
            
            addFormMessage(formDiv);
            
            const btnGuardar = formDiv.querySelector('.guardarExpBtn');
            btnGuardar.addEventListener('click', () => {
                const puesto = formDiv.querySelector('.expPuesto').value;
                const empresa = formDiv.querySelector('.expEmpresa').value;
                const inicio = formDiv.querySelector('.expInicio').value;
                const fin = formDiv.querySelector('.expFin').value;
                const descripcion = formDiv.querySelector('.expDescripcion').value;
                
                if (puesto && empresa && inicio && fin && descripcion) {
                    cvData.experiencia.push({ puesto, empresa, inicio, fin, descripcion });
                    addMessage(`${text[currentLang].experienciaGuardada}${puesto} en ${empresa}`, 'bot');
                    addMessage(text[currentLang].preguntarOtro, 'bot');
                    step = 5.5;
                    esperandoRespuesta = true;
                } else {
                    addMessage(text[currentLang].campoObligatorio, 'bot');
                }
            });
            
            const btnSaltar = formDiv.querySelector('.saltarExpBtn');
            btnSaltar.addEventListener('click', () => {
                addMessage(text[currentLang].saltarExperiencia, 'bot');
                addMessage(text[currentLang].askIdiomas, 'bot');
                mostrarFormularioIdioma();
                step = 6;
                esperandoRespuesta = false;
            });
        }

        function mostrarFormularioIdioma() {
            const formDiv = document.createElement('div');
            formDiv.className = 'form-campo';
            formDiv.innerHTML = `
                <input type="text" class="idiomaNombre" placeholder="${text[currentLang].idioma}">
                <select class="idiomaNivel">
                    <option value="">${text[currentLang].nivel}</option>
                    <option value="A1">A1</option>
                    <option value="A2">A2</option>
                    <option value="B1">B1</option>
                    <option value="B2">B2</option>
                    <option value="C1">C1</option>
                    <option value="C2">C2</option>
                </select>
                <button class="guardarIdiomaBtn">${text[currentLang].guardarIdioma}</button>
                <button class="saltarIdiomaBtn btn-saltar">${text[currentLang].noIdiomas}</button>
            `;
            
            addFormMessage(formDiv);
            
            const btnGuardar = formDiv.querySelector('.guardarIdiomaBtn');
            btnGuardar.addEventListener('click', () => {
                const idioma = formDiv.querySelector('.idiomaNombre').value;
                const nivel = formDiv.querySelector('.idiomaNivel').value;
                
                if (idioma && nivel) {
                    cvData.idiomas.push({ idioma, nivel });
                    addMessage(`${text[currentLang].idiomaGuardado}${idioma} - ${nivel}`, 'bot');
                    addMessage(text[currentLang].preguntarOtro, 'bot');
                    step = 6.5;
                    esperandoRespuesta = true;
                } else {
                    addMessage(text[currentLang].campoObligatorio, 'bot');
                }
            });
            
            const btnSaltar = formDiv.querySelector('.saltarIdiomaBtn');
            btnSaltar.addEventListener('click', () => {
                addMessage(text[currentLang].saltarIdiomas, 'bot');
                addMessage(text[currentLang].askCarnet, 'bot');
                step = 7;
                esperandoRespuesta = false;
            });
        }

        function procesarInput(input) {
            if (!esperandoRespuesta) {
                if (step === 0) {
                    cvData.nombre = input;
                    addMessage(input, 'user');
                    addMessage(text[currentLang].askFecha, 'bot');
                    step = 1;
                    return;
                }
                
                if (step === 1) {
                    cvData.fecha = input;
                    addMessage(input, 'user');
                    addMessage(text[currentLang].askEnlaces, 'bot');
                    mostrarFormularioEnlaces();
                    step = 2;
                    return;
                }
                
                if (step === 3) {
                    cvData.enlaces = enlacesTemp;
                    cvData.descripcion = input;
                    addMessage(input, 'user');
                    addMessage(text[currentLang].askEducacion, 'bot');
                    mostrarFormularioEducacion();
                    step = 4;
                    return;
                }
            } else {
                addMessage(input, 'user');
                
                if (step === 2.5) {
                    if (input.toLowerCase() === 'si' || input.toLowerCase() === 'yes') {
                        mostrarFormularioEnlaces();
                        step = 2;
                        esperandoRespuesta = false;
                    } else {
                        addMessage(text[currentLang].askDescripcion, 'bot');
                        step = 3;
                        esperandoRespuesta = false;
                    }
                    return;
                }
                
                if (step === 4.5) {
                    if (input.toLowerCase() === 'si' || input.toLowerCase() === 'yes') {
                        mostrarFormularioEducacion();
                        step = 4;
                        esperandoRespuesta = false;
                    } else {
                        addMessage(text[currentLang].askExperiencia, 'bot');
                        mostrarFormularioExperiencia();
                        step = 5;
                        esperandoRespuesta = false;
                    }
                    return;
                }
                
                if (step === 5.5) {
                    if (input.toLowerCase() === 'si' || input.toLowerCase() === 'yes') {
                        mostrarFormularioExperiencia();
                        step = 5;
                        esperandoRespuesta = false;
                    } else {
                        addMessage(text[currentLang].askIdiomas, 'bot');
                        mostrarFormularioIdioma();
                        step = 6;
                        esperandoRespuesta = false;
                    }
                    return;
                }
                
                if (step === 6.5) {
                    if (input.toLowerCase() === 'si' || input.toLowerCase() === 'yes') {
                        mostrarFormularioIdioma();
                        step = 6;
                        esperandoRespuesta = false;
                    } else {
                        addMessage(text[currentLang].askCarnet, 'bot');
                        step = 7;
                        esperandoRespuesta = false;
                    }
                    return;
                }
            }
            
            if (step === 7) {
                cvData.carnet = input.toLowerCase();
                addMessage(input, 'user');
                addMessage(text[currentLang].cvCompletado, 'bot');
                document.getElementById('inputArea').style.display = 'none';
                document.getElementById('downloadContainer').style.display = 'block';
                return;
            }
        }

        function generarHTML() {
            let educacionHTML = '';
            for (let edu of cvData.educacion) {
                educacionHTML += `
                    <div style="margin-bottom: 20px;">
                        <strong>${edu.institucion}</strong><br>
                        ${edu.inicio} - ${edu.fin}<br>
                        <em>${edu.descripcion}</em>
                    </div>
                `;
            }
            
            let experienciaHTML = '';
            for (let exp of cvData.experiencia) {
                experienciaHTML += `
                    <div style="margin-bottom: 20px;">
                        <strong>${exp.puesto}</strong> - ${exp.empresa}<br>
                        ${exp.inicio} - ${exp.fin}<br>
                        <em>${exp.descripcion}</em>
                    </div>
                `;
            }
            
            let idiomasHTML = '';
            for (let idi of cvData.idiomas) {
                idiomasHTML += `<li>${idi.idioma} - ${idi.nivel}</li>`;
            }
            
            let enlacesHTML = '';
            if (cvData.enlaces.length > 0) {
                enlacesHTML = `<p><strong>${text[currentLang].enlacesTitulo}</strong></p>`;
                for (let enlace of cvData.enlaces) {
                    enlacesHTML += `
                        <p style="margin-left: 15px;">
                            <strong style="color: black; text-decoration: none; font-weight: bold;">
                                <a href="${enlace.url}" style="color: black; text-decoration: none; font-weight: bold;">${enlace.nombre}</a>
                            </strong>
                        </p>
                    `;
                }
            }
            
            return `
                <div style="font-family: 'Segoe UI', Arial, sans-serif; padding: 40px; max-width: 800px; margin: 0 auto;">
                    <h1 style="color: #667eea;">${cvData.nombre}</h1>
                    <p><strong>${text[currentLang].fechaNacimiento}</strong> ${cvData.fecha}</p>
                    ${enlacesHTML}
                    <p><strong>${text[currentLang].perfil}</strong><br>${cvData.descripcion}</p>
                    
                    <h2 style="color: #764ba2; margin-top: 20px;">${text[currentLang].educacionTitulo}</h2>
                    ${educacionHTML || `<p>${text[currentLang].noEspecificada}</p>`}
                    
                    <h2 style="color: #764ba2; margin-top: 20px;">${text[currentLang].experienciaTitulo}</h2>
                    ${experienciaHTML || `<p>${text[currentLang].noEspecificada}</p>`}
                    
                    <h2 style="color: #764ba2; margin-top: 20px;">${text[currentLang].idiomasTitulo}</h2>
                    <ul>${idiomasHTML || `<li>${text[currentLang].noEspecificados}</li>`}</ul>
                    
                    <h2 style="color: #764ba2; margin-top: 20px;">${text[currentLang].carnetTitulo}</h2>
                    <p>${cvData.carnet === 'si' || cvData.carnet === 'yes' ? text[currentLang].si : text[currentLang].no}</p>
                </div>
            `;
        }

        async function downloadPDF() {
            const htmlContent = generarHTML();
            const element = document.createElement('div');
            element.innerHTML = htmlContent;
            document.body.appendChild(element);
            
            const opt = {
                margin: [0.5, 0.5, 0.5, 0.5],
                filename: `CV_${cvData.nombre.replace(/\s/g, '_')}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
            };
            
            await html2pdf().set(opt).from(element).save();
            document.body.removeChild(element);
        }

        // Inicializar según idioma seleccionado
        function initLanguage(lang) {
            currentLang = lang;
            document.getElementById('headerTitle').textContent = text[lang].header;
            document.getElementById('downloadBtn').textContent = text[lang].downloadBtn;
            document.getElementById('reiniciarBtn').textContent = text[lang].restartBtn;
            document.getElementById('welcomeMessage').textContent = text[lang].welcome;
            document.getElementById('chatContainer').style.display = 'block';
            document.getElementById('languageModal').style.display = 'none';
        }

        document.getElementById('selectSpanish').addEventListener('click', () => initLanguage('es'));
        document.getElementById('selectEnglish').addEventListener('click', () => initLanguage('en'));

        document.getElementById('sendBtn').addEventListener('click', () => {
            const input = document.getElementById('chatInput');
            const textValue = input.value.trim();
            if (textValue === '') return;
            procesarInput(textValue);
            input.value = '';
        });

        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('sendBtn').click();
            }
        });

        document.getElementById('downloadBtn').addEventListener('click', downloadPDF);
        document.getElementById('reiniciarBtn').addEventListener('click', reiniciarTodo);
    </script>
</body>
</html>
